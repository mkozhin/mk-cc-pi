name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Проверить синтаксис скриптов скиллов
        run: |
          find plugins -name '*.py' -print0 | xargs -0 -n1 python3 -m py_compile
      - name: Smoke-тест analyze_dag.py
        run: python3 tests/test_analyze_dag.py
